<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yara Store</title>
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Scroll Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">Yara</div>

    <nav id="nav">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Hero -->
<section class="hero">
    <div class="overlay"></div>
    <div class="hero-text">
        <h1>Yara Store</h1>
        <p>Elegant fashion for every woman.</p>
        <button>Shop Now</button>
    </div>
</section>

<!-- Shop -->
<section class="shop" data-aos="fade-up">
    <h2>Our Products</h2>

    <div class="products">
        <div class="card">
            <img src="images/p1.jpg">
            <h3>Dress</h3>
            <p>$25</p>
        </div>

        <div class="card">
            <img src="images/p1.jpg">
            <h3>Shirt</h3>
            <p>$18</p>
        </div>

        <div class="card">
            <img src="images/p1.jpg">
            <h3>Jacket</h3>
            <p>$40</p>
        </div>
    </div>
</section>

<!-- Contact -->
<section class="contact" data-aos="fade-up">
    <h2>Contact Us</h2>
    <p>WhatsApp: +964XXXXXXXXXX</p>
    <p>Instagram: @yarastore</p>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 Yara Store. All rights reserved.</p>
</footer>

<!-- WhatsApp Button -->
<a href="https://wa.me/964XXXXXXXXXX" class="whatsapp" target="_blank">💬</a>

<script src="script.js"></script>

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
